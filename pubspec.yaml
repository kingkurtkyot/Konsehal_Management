name: konsehal_management
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
    
  # --- UI & Fonts ---
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  
  # --- Image Processing & AI ---
  google_generative_ai: ^0.4.7
  image_picker: ^1.0.7
  flutter_dotenv: ^5.1.0
  
  # --- Storage & Persistence ---
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # --- Export & PDF ---
  pdf: ^3.10.0
  printing: ^5.11.0
  
  # --- Notifications ---
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  
  # --- Photo Template Features ---
  share_plus: ^7.2.1
  gal: ^1.1.2  
  # --- Permissions ---
  permission_handler: ^11.3.1
  
  # --- Charts & Reporting ---
  fl_chart: ^0.69.0
  
  # --- Date Formatting ---
  intl: ^0.19.0
  table_calendar: ^3.1.3
  supabase_flutter: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/seal.png"
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/seal.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env